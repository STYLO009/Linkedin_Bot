<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Content Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🚀 AI Content Generator</h1>

  <div class="input-box">
    <input id="topic" placeholder="Enter your topic..." />
    <button id="generateBtn">Generate</button>
  </div>

  <div class="loader" id="loader">
    Generating<span>.</span><span>.</span><span>.</span>
  </div>

  <div class="card">
    <div class="copy-btn" id="copyAbout">📋 Copy</div>
    <h3>Greeting</h3>
    <p id="about"></p>
  </div>

  <div class="card">
    <div class="copy-btn" id="copyLinkedin">📋 Copy</div>
    <h3>LinkedIn Post</h3>
    <p id="linkedin"></p>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
