<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Content Generator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  color: white;
}

/* MAIN CONTAINER */
.container {
  width: 100%;
  max-width: 900px;
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 2.5rem;
}

/* INPUT SECTION */
.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

input {
  flex: 1;
  padding: 14px;
  font-size: 1.1rem;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 14px 22px;
  font-size: 1.1rem;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #16a34a;
}

/* CARDS */
.card {
  margin-top: 20px;
  padding: 25px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

h3 {
  margin-bottom: 12px;
  font-size: 1.4rem;
}

/* TEXT OUTPUT */
p {
  font-size: 1.1rem;
  line-height: 1.7;
  white-space: pre-line;
}

/* COPY BUTTON */
.copy-btn {
  float: right;
  font-size: 0.9rem;
  cursor: pointer;
  opacity: 0.7;
}

.copy-btn:hover {
  opacity: 1;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 15px;
  font-size: 1.2rem;
}

.loader span {
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100% { opacity: 0 }
  50% { opacity: 1 }
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .input-box {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>🚀 AI Content Generator</h1>

  <div class="input-box">
    <input id="topic" placeholder="Enter your topic..." />
    <button onclick="generate()">Generate</button>
  </div>

  <div class="loader" id="loader">
    Generating<span>.</span><span>.</span><span>.</span>
  </div>

  <div class="card">
    <div class="copy-btn" onclick="copyText('about')">📋 Copy</div>
    <h3>Greeting</h3>
    <p id="about"></p>
  </div>

  <div class="card">
    <div class="copy-btn" onclick="copyText('linkedin')">📋 Copy</div>
    <h3>LinkedIn Post</h3>
    <p id="linkedin"></p>
  </div>

</div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value;
  const loader = document.getElementById("loader");

  if (!topic) {
    alert("Enter a topic!");
    return;
  }

  loader.style.display = "block";

  try {
    const res = await fetch("http://127.0.0.1:8000/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    const data = await res.json();

    document.getElementById("about").innerText = data.about;
    document.getElementById("linkedin").innerText = data.linkedin;

  } catch (err) {
    alert("Backend not running!");
  }

  loader.style.display = "none";
}

function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
